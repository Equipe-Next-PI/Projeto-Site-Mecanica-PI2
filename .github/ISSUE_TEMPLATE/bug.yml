name: "🐞 Reportar BUG"
description: "Relate um problema, comportamento inesperado ou erro do sistema"
title: "[BUG] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🐞 Bug Report

        Obrigado por ajudar a melhorar este projeto!  
        Por favor, forneça o máximo de detalhes possível para que possamos reproduzir e corrigir o problema rapidamente.

        **Dicas para um bom relatório**
        - Seja específico e claro
        - Inclua passos para reproduzir o problema
        - Anexe capturas de tela ou logs, se possível
        - Descreva o que você esperava vs. o que realmente aconteceu

  - type: textarea
    id: problem_description
    attributes:
      label: 📋 Descrição do Problema
      description: Descreva claramente o bug que você encontrou.
      placeholder: |
        Exemplo:
        Ao enviar o formulário de login, o sistema retorna um erro 500 em vez de autenticar o usuário.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: 🔁 Passos para Reproduzir
      description: Forneça passos detalhados para que possamos reproduzir o problema.
      placeholder: |
        1. Vá para a página de login
        2. Insira credenciais válidas
        3. Clique em "Login"
        4. Observe a mensagem de erro
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: ✅ Comportamento Esperado
      description: O que deveria acontecer quando a funcionalidade funciona corretamente?
      placeholder: |
        Exemplo:
        O usuário deve ser logado com sucesso e redirecionado para o painel de controle (dashboard).
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: ❌ Comportamento Atual
      description: O que realmente aconteceu em vez disso?
      placeholder: |
        Exemplo:
        O sistema retorna um erro 500 e exibe "Internal Server Error".
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 📎 Evidencia (Screenshots, Logs, Errors)
      description: Anexe prints, logs, stack traces ou mensagens de erro.
      placeholder: |
        Exemplo:
        - Capturas de tela do problema
        - Logs de erro
        - Stack trace
        - Saída do console (Console output)

  - type: input
    id: environment
    attributes:
      label: 💻 Ambiente
      description: Forneça detalhes sobre o ambiente onde o bug ocorreu.
      placeholder: |
        Exemplo: 
        SO: Windows 11
        Navegador: Chrome 121
        Node: 18.x
        Versão do App: 1.3.2

  - type: textarea
    id: additional_context
    attributes:
      label: 🧩 Contexto Adicional
      description: Adicione qualquer outra informação que possa ajudar a entender o problema.
      placeholder: |
        Exemplo:
        O problema começou após a última implantação (deployment).

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: ✔ Critérios de Aceitação
      description: Condições necessárias para considerar este bug como resolvido.
      options:
        - label: O bug foi corrigido
        - label: A correção foi testada em ambiente de desenvolvimento
        - label: A alteração não introduz regressões
        - label: Testes relevantes foram adicionados ou atualizados